name: KrepAPI
version: '${version}'
main: net.shik.krepapi.plugin.KrepAPIPlugin
api-version: '1.21.4'
description: Config-driven KrepAPI key bindings (Paper 1.21.4–26.1.1, one jar); handshake and commands handled for you.
authors: [ ShinKuyomi (Shik) ]
website: https://shik.work

commands:
  krepapi:
    description: KrepAPI admin commands (settings, status, reload)
    usage: /<command> <debug|require-mod|min-version|handshake-timeout|status|reload>
    permission: krepapi.admin

permissions:
  krepapi.admin:
    description: Allows use of /krepapi admin commands
    default: op
  krepapi.update.notify:
    description: Receive in-game KrepAPI plugin update notices (join) when a newer JAR is published
    default: op
  krepapi.*:
    description: All KrepAPI permissions (admin commands + update notices)
    children:
      krepapi.admin: true
      krepapi.update.notify: true
