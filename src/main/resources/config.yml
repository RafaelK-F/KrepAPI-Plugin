# Same as KrepAPI Paper reference: console lines prefixed [KrepAPI-Debug] and NDJSON in plugins/KrepAPI-Plugin/debug-*.json.
# Also enabled when the server JVM has -Dkrepapi.debug=true or an empty krepapi-debug.txt exists in the server working directory (Fabric dedicated parity).
# Legacy key `debug` is still accepted if present; prefer `debug-logging` to match KrepAPI.
debug-logging: false
# When debug-logging is true: chunk long hex in the console, add thread name + structured hex to NDJSON, decode-error details,
# capability bit names, constraint lists on handshake, session_start line, and extra update-check / dispatch detail.
debug-logging-verbose: false

# Remote version manifest (same JSON layout as KrepAPI .system/plugin/versions.json). Notifies players with krepapi.* or krepapi.update.notify when a newer JAR exists; click opens the download in the browser (replace the file on the host manually).
update-check:
  enabled: true
  notify-on-join: true
  # Ticks after join before sending the update message (allows client to finish loading).
  notify-delay-ticks: 80
  # How often to re-fetch versions.json (async). Default 360 minutes = 6 hours.
  interval-minutes: 360
  versions-url: "https://raw.githubusercontent.com/RafaelK-F/KrepAPI/main/.system/plugin/versions.json"
  jar-download-base-url: "https://github.com/RafaelK-F/KrepAPI/raw/main/.system/plugin/jar/"
  fallback-page-url: "https://github.com/RafaelK-F/KrepAPI"

# Kick players who do not complete the KrepAPI handshake (no mod / wrong version).
require-krepapi: true
# Minimum accepted KrepAPI client mod version (see KrepAPI protocol docs for expression syntax).
minimum-mod-version: "1.0"
# Ticks before kicking when require-krepapi is true (20 ticks = 1 second).
handshake-timeout-ticks: 200

# Key bindings: each entry key is the action id (stable protocol identifier); values are UI label, key, and command.
# - key: GLFW key code (e.g. 71 = G, 78 = N). See GLFW docs / key tables.
# - display-name: Shown in the client bindings UI.
# - override-vanilla: if true, the server may override the vanilla action for that key.
# - category: UI grouping (short free-form string).
# - command: Run as the player on key press (not release); leading / is optional.
#
# Copy-paste example (commented):
#   open_menu:
#     key: 71
#     display-name: "Open menu"
#     override-vanilla: false
#     category: server
#     command: "menu"

bindings:
  # Starter binding: G runs /help — edit or remove this entry.
  krepapi_example_help:
    key: 71
    display-name: "Example: help (/help)"
    override-vanilla: false
    category: server
    command: "help"
